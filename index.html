<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新思想论坛 / NT论坛</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 全局重置与排版优化 (类似 ChatGPT 的极简风格) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #f9fafb; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            color: #1a1a1a;
        }
        /* 主容器居中悬浮，增加阴影与圆角，质感升级 */
        #app { 
            width: 100%; 
            max-width: 1200px; 
            background: #ffffff; 
            min-height: 100vh; 
            padding: 0; 
            position: relative; 
            box-shadow: 0 0 40px rgba(0,0,0,0.04); 
            margin: 0 auto;
        }
        .hidden { display: none !important; }
 
        /* 顶部 Header 带毛玻璃效果 */
        header { 
            padding: 16px 24px; 
            border-bottom: 1px solid #e5e7eb; 
            display: flex; 
            flex-wrap: wrap; 
            align-items: center; 
            justify-content: space-between; 
            gap: 12px; 
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 20;
        }
        .brand { 
            font-size: 24px; 
            font-weight: 700; 
            letter-spacing: -0.02em; 
            background: linear-gradient(135deg, #d92b2b 0%, #b91c1c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .search-bar { 
            flex: 1; 
            min-width: 200px; 
            max-width: 400px; 
            position: relative; 
        }
        .search-bar input { 
            width: 100%; 
            padding: 10px 18px; 
            border: 1px solid #e5e7eb; 
            border-radius: 9999px; 
            font-size: 14px; 
            outline: none; 
            background: #f3f4f6; 
            transition: all 0.2s ease;
        }
        .search-bar input:focus { 
            background: #ffffff; 
            border-color: #d92b2b; 
            box-shadow: 0 0 0 3px rgba(217, 43, 43, 0.1);
        }
        .welcome-msg { 
            width: 100%; 
            text-align: center; 
            color: #6b7280; 
            font-size: 14px; 
            padding: 4px 0; 
            letter-spacing: 1px; 
        }
 
        /* 导航栏 采用药丸形状按钮 */
        nav { 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 6px 12px; 
            padding: 14px 24px; 
            background: #f9fafb; 
            border-bottom: 1px solid #e5e7eb; 
        }
        .nav-btn { 
            background: transparent; 
            border: none; 
            padding: 8px 16px; 
            color: #4b5563; 
            font-size: 14px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.2s; 
            border-radius: 9999px; 
        }
        .nav-btn:hover { 
            background: #e5e7eb; 
            color: #111827; 
        }
        .nav-btn.active { 
            background: #fee2e2; 
            color: #d92b2b; 
            font-weight: 600; 
        }
        .nav-btn.admin-btn { 
            color: #dc2626; 
            font-weight: 600; 
        }
 
        /* 页面容器 */
        .page-container { 
            padding: 24px; 
            max-width: 900px; 
            margin: 0 auto; 
        }
 
        /* 通知栏 现代卡片设计 */
        .notice-area { 
            background: #fcfcfc; 
            padding: 16px 20px; 
            border-radius: 12px; 
            margin-bottom: 24px; 
            border: 1px solid #e5e7eb;
            border-left: 4px solid #d92b2b; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .notice-area h4 { 
            color: #111827; 
            margin-bottom: 12px; 
            font-size: 15px; 
            font-weight: 600; 
        }
        .notice-scroll { 
            display: flex; 
            overflow-x: auto; 
            gap: 16px; 
            padding-bottom: 8px; 
            scrollbar-width: thin; 
        }
        .notice-scroll::-webkit-scrollbar { height: 6px; }
        .notice-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 9999px; }
        .notice-scroll::-webkit-scrollbar-track { background: #f3f4f6; border-radius: 9999px;}
        .notice-item { 
            min-width: 220px; 
            padding: 12px 16px; 
            background: #ffffff; 
            border: 1px solid #e5e7eb; 
            border-radius: 10px; 
            flex-shrink: 0; 
            position: relative; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .notice-item.revoked { opacity: 0.5; background: #f9fafb; }
        .notice-item .time { font-size: 12px; color: #9ca3af; display: block; margin-top: 6px; }
        .notice-item .del-btn { position: absolute; right: 12px; top: 12px; color: #d92b2b; background: transparent; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
 
        /* 帖子卡片 全新质感，白色卡片 + 精致阴影 */
        .post-card { 
            background: #ffffff; 
            border: 1px solid #e5e7eb; 
            padding: 24px; 
            border-radius: 16px; 
            margin-bottom: 20px; 
            transition: all 0.2s ease-in-out;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .post-card:hover { 
            border-color: #d1d5db; 
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
            transform: translateY(-1px);
        }
        .post-card .header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .post-card .author { color: #d92b2b; cursor: pointer; font-weight: 600; transition: 0.2s;}
        .post-card .author:hover { text-decoration: underline; }
        .post-card .content { line-height: 1.7; color: #1f2937; margin: 12px 0 16px; word-break: break-all; white-space: pre-wrap; font-size: 15px; }
        .post-card .meta { display: flex; gap: 12px; color: #6b7280; font-size: 13px; flex-wrap: wrap; }
        .post-card .meta button { background: #f3f4f6; border: 1px solid transparent; padding: 6px 16px; border-radius: 9999px; cursor: pointer; transition: all 0.2s; color: #4b5563; font-size: 13px;}
        .post-card .meta button:hover { background: #e5e7eb; color: #111827; }
        .post-card .status-tag { font-size: 12px; padding: 4px 12px; border-radius: 9999px; background: #f3f4f6; color: #6b7280; display: inline-block; font-weight: 500; }
        .post-card .status-tag.pending { background: #fef3c7; color: #d97706; }
        .post-card .status-tag.banned { background: #fee2e2; color: #dc2626; }
 
        /* 评论区 */
        .comment-list { margin-top: 16px; padding-left: 16px; border-left: 3px solid #e5e7eb; }
        .comment-item { font-size: 14px; color: #4b5563; margin-bottom: 8px; line-height: 1.5;}
        .comment-item b { color: #1f2937; font-weight: 600; }
        .comment-input { display: flex; gap: 12px; margin-top: 12px; }
        .comment-input input { flex: 1; padding: 8px 14px; border: 1px solid #e5e7eb; border-radius: 9999px; font-size: 14px; outline: none; background: #f9fafb; transition: 0.2s;}
        .comment-input input:focus { border-color: #d92b2b; background: #ffffff; }
        .comment-input button { background: #d92b2b; color: #fff; border: none; padding: 8px 20px; border-radius: 9999px; cursor: pointer; font-weight: 500; transition: 0.2s;}
        .comment-input button:hover { opacity: 0.9; box-shadow: 0 2px 4px rgba(217,43,43,0.2); }
 
        /* 表单与输入框 统一现代化圆角 */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #374151; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 12px; font-size: 15px; outline: none; background: #fcfcfc; transition: 0.2s; }
        .form-group input:focus, .form-group textarea:focus { border-color: #d92b2b; background: #ffffff; box-shadow: 0 0 0 4px rgba(217, 43, 43, 0.1); }
        .form-group textarea { resize: vertical; min-height: 100px; }
        
        /* 主按钮 品牌色点缀 */
        .btn { 
            background: linear-gradient(135deg, #d92b2b 0%, #b91c1c 100%); 
            color: #fff; 
            border: none; 
            padding: 14px 24px; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            font-weight: 600;
            transition: all 0.2s ease; 
            box-shadow: 0 2px 4px rgba(217, 43, 43, 0.15);
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(217, 43, 43, 0.2); }
        .btn:active { transform: translateY(1px); box-shadow: 0 1px 2px rgba(217, 43, 43, 0.15); }
        .btn-gray { 
            background: #f3f4f6; 
            color: #374151; 
            box-shadow: none; 
            background: #e5e7eb; 
            font-weight: 500;
        }
        .btn-gray:hover { background: #d1d5db; color: #111827; box-shadow: none; }
        .btn-sm { width: auto; padding: 8px 18px; font-size: 13px; margin: 0; }
 
        /* 响应式适配（手机端） */
        @media (max-width: 768px) {
            #app { padding: 0; }
            header { padding: 12px 16px; flex-direction: row; flex-wrap: wrap; }
            .brand { font-size: 20px; }
            .search-bar { min-width: 100px; }
            nav { padding: 12px 16px; gap: 4px 8px; }
            .nav-btn { font-size: 13px; padding: 6px 12px; }
            .page-container { padding: 16px; }
            .post-card { padding: 16px; }
        }
 
        /* Toast 提示 风格对齐 */
        #toast { 
            position: fixed; 
            top: 24px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #1f2937; 
            color: #fff; 
            padding: 14px 28px; 
            border-radius: 12px; 
            z-index: 9999; 
            display: none; 
            max-width: 90%; 
            text-align: center; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            font-weight: 500;
        }
    </style>
</head>
<body>
<!-- 注意：下面HTML结构和JS代码原封不动保持原样，完全没改 -->
<div id="app">
    <div id="toast"></div>
 
    <header>
        <div class="brand">新思想论坛 / NT论坛</div>
        <div class="search-bar"><input type="text" id="searchInput" placeholder="搜索文章或站内用户...回车搜索"></div>
        <div class="welcome-msg">欢迎同志加入</div>
    </header>
 
    <nav>
        <button class="nav-btn active" data-page="home" onclick="navigate('home')">首页</button>
        <button class="nav-btn" data-page="auth" onclick="navigate('auth')" id="authNavBtn">登录/注册</button>
        <button class="nav-btn" data-page="post" onclick="navigate('post')" id="postNavBtn" style="display:none;">发布文章</button>
        <button class="nav-btn" data-page="youth" onclick="navigate('youth')">青年信箱</button>
        <button class="nav-btn admin-btn" data-page="admin" onclick="navigate('admin')">管理者模式</button>
        <button class="nav-btn" data-page="profile" onclick="navigate('profile')" id="profileNavBtn" style="display:none;">个人中心</button>
    </nav>
 
    <div class="page-container">
        <div id="page-home">
            <div class="notice-area">
                <h4>📢 全站通知</h4>
                <div class="notice-scroll" id="noticeList"></div>
            </div>
            <div id="postList"></div>
        </div>
 
        <div id="page-auth" class="hidden" style="max-width: 400px; margin: 0 auto;">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn btn-gray" id="loginTab" onclick="switchAuthTab('login')">登录</button>
                <button class="btn btn-gray" id="registerTab" onclick="switchAuthTab('register')">注册</button>
            </div>
            <div class="form-group"><label>邮箱</label><input type="email" id="authEmail"></div>
            <div class="form-group"><label>密码</label><input type="password" id="authPassword"></div>
            <button class="btn" id="authActionBtn" onclick="handleAuth(this)">登录</button>
            <button class="btn btn-gray" style="margin-top:16px;" id="logoutBtn" onclick="handleLogout()">退出登录</button>
        </div>
 
        <div id="page-post" class="hidden" style="max-width: 600px; margin: 0 auto;">
            <h3 style="margin-bottom: 16px;">发布新文章</h3>
            <div class="form-group"><label>文章内容</label><textarea id="postContent" rows="6" placeholder="阐述你的新思想..."></textarea></div>
            <button class="btn" onclick="submitPost(this)">立即发布</button>
        </div>
 
        <div id="page-youth" class="hidden" style="max-width: 600px; margin: 0 auto;">
            <h3 style="text-align: center; margin-bottom: 20px;">📩 青年信箱</h3>
            <div class="form-group"><label>你的邮箱</label><input type="email" id="youthEmail" placeholder="请输入你的联系邮箱"></div>
            <div class="form-group"><label>信件内容</label><textarea id="youthContent" rows="6" placeholder="写下你想说的心里话..."></textarea></div>
            <button class="btn" onclick="submitYouthLetter(this)">✉️ 寄出信件</button>
        </div>
 
        <div id="page-admin" class="hidden" style="max-width: 700px; margin: 0 auto;">
            <h3 style="color:#d92b2b; text-align:center;">🔐 管理者模式</h3>
            <div id="adminPasswordBox">
                <div class="form-group"><label>请输入管理员密码</label><input type="password" id="adminPwdInput"></div>
                <button class="btn" onclick="verifyAdmin(this)">验证密码</button>
            </div>
            <div id="adminPanelBox" class="hidden">
                <div style="background: #f9fafb; padding: 20px; border-radius: 16px; margin: 20px 0; border: 1px solid #e5e7eb;">
                    <div class="form-group"><label>发布全站通知</label><textarea id="notifyContent" rows="3"></textarea></div>
                    <button class="btn" onclick="publishNotification(this)">发布通知</button>
                </div>
                <div>
                    <h4 style="margin-bottom:12px; color:#111827;">待审核文章</h4>
                    <div id="pendingPostsList" style="margin-bottom:24px;"></div>
                    <h4 style="margin-bottom:12px; color:#111827;">全部文章管理（可封禁/恢复）</h4>
                    <div id="allPostsList"></div>
                </div>
            </div>
        </div>
 
        <div id="page-profile" class="hidden" style="max-width: 600px; margin: 0 auto;">
            <h3 style="margin-bottom:16px;">个人中心</h3>
            <div style="padding: 24px; background: #f9fafb; border-radius: 16px; border: 1px solid #e5e7eb;">
                <h4 style="margin-bottom:16px;">修改个人资料</h4>
                <div class="form-group"><label>昵称</label><input id="profileUsername"></div>
                <div class="form-group"><label>年龄</label><input type="number" id="profileAge"></div>
                <div class="form-group"><label>简介</label><input id="profileBio"></div>
                <button class="btn" onclick="updateProfile(this)">保存修改</button>
            </div>
            <div style="margin-top: 20px; display:flex; gap:10px;">
                <button class="btn btn-gray" onclick="loadMyPosts()">查看我的文章</button>
                <button class="btn btn-gray" onclick="loadMyCollections()">查看我的收藏</button>
            </div>
            <div id="myPostsList"></div>
        </div>
 
        <div id="page-user" class="hidden" style="max-width: 600px; margin: 0 auto;">
            <div id="userInfoArea"></div>
            <div id="userPostList"></div>
        </div>
    </div>
</div>
 
<script>
(function() {
    'use strict';
    // ============================
    // 1. Supabase 初始化
    // ============================
    // 用 sb 而不是 supabase 作为客户端变量名，避免和 CDN 全局对象 window.supabase 混淆/冲突
    const supabaseUrl = 'https://cjyxleokhkpqkwziuy.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqeXhsZW9raGtwcWt3eml1eSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzM1MTU4NjUxLCJleHAiOjIwNTA3MzQ2NTF9.2WZ4P3Y2nPb_xoIe01V_-snWl3kY-Bi5tV2FqMl4bVc';
    const sb = window.supabase.createClient(supabaseUrl, supabaseKey);
 
    let currentUser = null;
    let isAdminUI = false;
    let isAdminRole = false;
 
    // ============================
    // 2. 辅助工具
    // ============================
    function showToast(msg, color='#333') {
        const toast = document.getElementById('toast');
        toast.style.background = color;
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
 
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.innerText = str ?? '';
        return div.innerHTML;
    }
 
    async function getCurrentUser() {
        try {
            const { data } = await sb.auth.getUser();
            return data.user || null;
        } catch { return null; }
    }
 
    // 通用：点击按钮执行异步操作时显示"处理中..."并禁用按钮
    async function withLoading(btn, fn) {
        if(!btn) return fn();
        if(btn.dataset.loading === '1') return;
        const originalText = btn.innerText;
        btn.dataset.loading = '1';
        btn.disabled = true;
        btn.style.opacity = '0.6';
        btn.innerText = '处理中...';
        try {
            await fn();
        } finally {
            btn.dataset.loading = '0';
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.innerText = originalText;
        }
    }
 
    async function checkIsAdminRole(userId) {
        if (!userId) return false;
        const { data } = await sb.from('profiles').select('role').eq('id', userId).single();
        return data && data.role === 'admin';
    }
 
    // ============================
    // 3. 页面路由与导航
    // ============================
    const pages = ['home', 'auth', 'post', 'youth', 'admin', 'profile', 'user'];
    function navigate(pageName) {
        pages.forEach(p => {
            const el = document.getElementById(`page-${p}`);
            if(el) el.classList.add('hidden');
        });
        document.getElementById(`page-${pageName}`).classList.remove('hidden');
 
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const navBtn = document.querySelector(`.nav-btn[data-page="${pageName}"]`);
        if(navBtn) navBtn.classList.add('active');
 
        if(pageName === 'home') {
            loadNotices(); loadPosts();
        } else if(pageName === 'profile') {
            if(!currentUser) { navigate('auth'); return; }
            loadProfileData();
        } else if(pageName === 'post') {
            if(!currentUser) { navigate('auth'); return; }
        } else if(pageName === 'admin') {
            document.getElementById('logoutBtn').classList.add('hidden');
        }
    }
 
    // ============================
    // 4. 用户身份验证
    // ============================
    function updateNavForUser(isLoggedIn) {
        document.getElementById('authNavBtn').innerText = isLoggedIn ? '账号' : '登录/注册';
        document.getElementById('postNavBtn').style.display = isLoggedIn ? 'inline-block' : 'none';
        document.getElementById('profileNavBtn').style.display = isLoggedIn ? 'inline-block' : 'none';
        document.getElementById('logoutBtn').classList.toggle('hidden', !isLoggedIn);
    }
 
    let authMode = 'login';
    function switchAuthTab(mode) {
        authMode = mode;
        document.getElementById('authActionBtn').innerText = mode === 'login' ? '登录' : '注册';
    }
 
    async function handleAuth(btn) {
        const email = document.getElementById('authEmail').value.trim();
        const pass = document.getElementById('authPassword').value;
        if(!email || !pass) return showToast('请填写完整信息');
 
        await withLoading(btn, async () => {
            let res;
            if(authMode === 'login') {
                res = await sb.auth.signInWithPassword({ email, password: pass });
            } else {
                res = await sb.auth.signUp({ email, password: pass });
                if(!res.error) {
                    if(res.data.session && res.data.user) {
                        currentUser = res.data.user;
                        isAdminRole = await checkIsAdminRole(currentUser.id);
                        updateNavForUser(true);
                        navigate('home');
                        showToast('注册成功，已自动登录！', '#d92b2b');
                    } else {
                        showToast('注册成功！请前往邮箱验证激活后再登录。', '#d92b2b');
                    }
                    return;
                }
            }
 
            if(res.error) { showToast(res.error.message, '#d92b2b'); return; }
            if(res.data.user) {
                if(!res.data.user.confirmed_at && !res.data.session) {
                    await sb.auth.signOut();
                    showToast('请先前往邮箱验证账号！', '#d92b2b');
                    return;
                }
                currentUser = res.data.user;
                isAdminRole = await checkIsAdminRole(currentUser.id);
                updateNavForUser(true);
                navigate('home');
                showToast('欢迎同志回到新思想论坛！', '#d92b2b');
            }
        });
    }
 
    async function handleLogout() {
        await sb.auth.signOut();
        currentUser = null;
        isAdminRole = false;
        isAdminUI = false;
        updateNavForUser(false);
        document.getElementById('adminPasswordBox').classList.remove('hidden');
        document.getElementById('adminPanelBox').classList.add('hidden');
        navigate('home');
        showToast('已退出登录');
    }
 
    // ============================
    // 5. 首页：通知 + 文章
    // ============================
    async function loadNotices() {
        const { data, error } = await sb.from('notifications').select('*').order('created_at', { ascending: false });
        const container = document.getElementById('noticeList');
        container.innerHTML = '';
        if(error) { container.innerHTML = '<span style="color:#999; font-size:14px;">通知加载失败</span>'; return; }
        if(data && data.length > 0) {
            data.forEach(n => {
                const div = document.createElement('div');
                div.className = 'notice-item' + (n.is_active ? '' : ' revoked');
                div.innerHTML = `${escapeHtml(n.content)}${n.is_active ? '' : ' (已撤销)'} <span class="time">${new Date(n.created_at).toLocaleString()}</span>
                ${(isAdminUI && isAdminRole && n.is_active) ? `<button class="del-btn" onclick="removeNotice(${n.id})">撤销</button>` : ''}`;
                container.appendChild(div);
            });
        } else {
            container.innerHTML = '<span style="color:#9ca3af; font-size:14px;">暂无历史通知</span>';
        }
    }
 
    async function loadPosts(keyword = '') {
        let query = sb.from('posts').select('*, profiles(username, id)').eq('status', 'approved').order('created_at', { ascending: false });
        if(keyword) query = query.ilike('content', `%${keyword}%`);
        const { data, error } = await query;
        const container = document.getElementById('postList');
        container.innerHTML = '';
        if(error) return showToast('加载失败');
        if(!data || data.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#9ca3af; padding:60px 0; font-size:15px;">还没有文章，欢迎发布第一篇思想！</div>';
            return;
        }
 
        let myCollections = [];
        if(currentUser) {
            const { data: cols } = await sb.from('collections').select('post_id').eq('user_id', currentUser.id);
            myCollections = (cols || []).map(c => c.post_id);
        }
 
        for(let post of data) {
            const card = document.createElement('div');
            card.className = 'post-card';
            const isCollected = myCollections.includes(post.id);
            const authorName = post.profiles ? (post.profiles.username || '未命名同志') : '未知用户';
            const authorId = post.profiles ? post.profiles.id : null;
 
            card.innerHTML = `
                <div class="header">
                    <span class="author" onclick="${authorId ? `goToUserProfile('${authorId}')` : ''}">${escapeHtml(authorName)}</span>
                    <span style="color:#9ca3af; font-size:13px;">${new Date(post.created_at).toLocaleString()}</span>
                </div>
                <div class="content">${escapeHtml(post.content)}</div>
                <div class="meta">
                    <button onclick="toggleCollect(${post.id}, this)">${isCollected ? '❤️ 已收藏' : '🤍 收藏'}</button>
                    <span>💬 评论区见下方</span>
                </div>
                <div class="comment-list" id="comments-${post.id}"></div>
                <div class="comment-input">
                    <input type="text" id="comment-input-${post.id}" placeholder="写下你的评论...">
                    <button onclick="submitComment(${post.id}, this)">发送</button>
                </div>
            `;
            container.appendChild(card);
            loadComments(post.id);
        }
    }
 
    async function loadComments(postId) {
        const { data } = await sb.from('comments').select('*, profiles(username)').eq('post_id', postId).order('created_at', { ascending: true });
        const container = document.getElementById(`comments-${postId}`);
        if(container) {
            container.innerHTML = '';
            if(data && data.length > 0) {
                data.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'comment-item';
                    div.innerHTML = `<b>${escapeHtml(c.profiles ? c.profiles.username : '匿名')}</b>: ${escapeHtml(c.content)}`;
                    container.appendChild(div);
                });
            }
        }
    }
 
    // ============================
    // 6. 发布文章 & 评论 & 收藏
    // ============================
    async function submitPost(btn) {
        if(!currentUser) return showToast('请先登录');
        const contentEl = document.getElementById('postContent');
        const content = contentEl.value.trim();
        if(!content) return showToast('请输入内容');
        await withLoading(btn, async () => {
            const { error } = await sb.from('posts').insert({ content, user_id: currentUser.id });
            if(error) { showToast('发布失败: ' + error.message, '#d92b2b'); return; }
            showToast('文章发布成功，等待管理员审核');
            contentEl.value = '';
            navigate('home');
        });
    }
 
    async function submitComment(postId, btn) {
        if(!currentUser) return showToast('请先登录');
        const input = document.getElementById(`comment-input-${postId}`);
        if(!input.value.trim()) return showToast('请输入评论');
        await withLoading(btn, async () => {
            const { error } = await sb.from('comments').insert({ post_id: postId, user_id: currentUser.id, content: input.value.trim() });
            if(error) { showToast('评论失败: ' + error.message, '#d92b2b'); return; }
            input.value = '';
            loadComments(postId);
        });
    }
 
    async function toggleCollect(postId, btn) {
        if(!currentUser) return showToast('请先登录');
        const { data } = await sb.from('collections').select('id').eq('post_id', postId).eq('user_id', currentUser.id);
        if(data && data.length > 0) {
            await sb.from('collections').delete().eq('id', data[0].id);
            btn.innerText = '🤍 收藏';
        } else {
            const { error } = await sb.from('collections').insert({ post_id: postId, user_id: currentUser.id });
            if(error) return showToast('收藏失败: ' + error.message, '#d92b2b');
            btn.innerText = '❤️ 已收藏';
        }
    }
 
    // ============================
    // 7. 青年信箱 (调用 Supabase Edge Function: send-letter)
    // ============================
    async function submitYouthLetter(btn) {
        const emailEl = document.getElementById('youthEmail');
        const contentEl = document.getElementById('youthContent');
        const email = emailEl.value.trim();
        const content = contentEl.value.trim();
        if(!email || !content) return showToast('请填写完整');
 
        await withLoading(btn, async () => {
            const { error } = await sb.functions.invoke('send-letter', {
                body: { userEmail: email, messageContent: content }
            });
            if(error) { showToast('信件发送失败，请稍后重试', '#d92b2b'); return; }
            showToast('✅ 信件寄出！感谢您的来信。', '#d92b2b');
            emailEl.value = '';
            contentEl.value = '';
        });
    }
 
    // ============================
    // 8. 管理员模式
    // ============================
    async function verifyAdmin(btn) {
        const pwd = document.getElementById('adminPwdInput').value;
        if(pwd !== '1593572580asdfg') {
            return showToast('密码错误，拒绝进入管理者模式', '#d92b2b');
        }
        if(!currentUser) {
            return showToast('请先登录账号，再尝试进入管理者模式', '#d92b2b');
        }
        await withLoading(btn, async () => {
            isAdminRole = await checkIsAdminRole(currentUser.id);
            if(!isAdminRole) {
                showToast('密码正确，但当前账号没有管理员权限（需在数据库中设置）', '#d92b2b');
                return;
            }
            isAdminUI = true;
            document.getElementById('adminPasswordBox').classList.add('hidden');
            document.getElementById('adminPanelBox').classList.remove('hidden');
            showToast('管理员权限解锁成功！');
            loadNotices();
            loadAdminPostLists();
        });
    }
 
    async function publishNotification(btn) {
        if(!isAdminUI || !isAdminRole) return showToast('权限不足');
        const input = document.getElementById('notifyContent');
        const content = input.value.trim();
        if(!content) return showToast('通知内容不能为空');
        await withLoading(btn, async () => {
            const { error } = await sb.from('notifications').insert({ content });
            if(error) { showToast('发布失败：' + error.message, '#d92b2b'); return; }
            input.value = '';
            showToast('全站通知已发布！');
            loadNotices();
        });
    }
 
    async function removeNotice(noticeId) {
        if(!isAdminUI || !isAdminRole) return showToast('权限不足');
        const { error } = await sb.from('notifications').update({ is_active: false }).eq('id', noticeId);
        if(error) return showToast('撤销失败：' + error.message, '#d92b2b');
        loadNotices();
    }
 
    async function loadAdminPostLists() {
        if(!isAdminRole) return;
        const { data: pending } = await sb.from('posts').select('*, profiles(username)').eq('status', 'pending').order('created_at', { ascending: false });
        const pendingContainer = document.getElementById('pendingPostsList');
        pendingContainer.innerHTML = '';
        if(pending && pending.length > 0) {
            pending.forEach(p => {
                const div = document.createElement('div');
                div.className = 'post-card';
                div.innerHTML = `
                    <div class="header"><span>${escapeHtml(p.profiles ? p.profiles.username : '未知')}</span><span class="status-tag pending">待审核</span></div>
                    <div class="content">${escapeHtml(p.content)}</div>
                    <div class="meta">
                        <button class="btn-sm" style="border-color:#2e9e3f; color:#2e9e3f; background: transparent; border: 1px solid;" onclick="reviewPost(${p.id}, 'approved')">✅ 通过</button>
                        <button class="btn-sm" style="border-color:#d92b2b; color:#d92b2b; background: transparent; border: 1px solid;" onclick="reviewPost(${p.id}, 'banned')">🚫 封禁</button>
                    </div>
                `;
                pendingContainer.appendChild(div);
            });
        } else {
            pendingContainer.innerHTML = '<div style="color:#9ca3af; padding:10px;">暂无待审核文章</div>';
        }
 
        const { data: all } = await sb.from('posts').select('*, profiles(username)').order('created_at', { ascending: false }).limit(50);
        const allContainer = document.getElementById('allPostsList');
        allContainer.innerHTML = '';
        if(all && all.length > 0) {
            all.forEach(p => {
                const div = document.createElement('div');
                div.className = 'post-card';
                div.innerHTML = `
                    <div class="header"><span>${escapeHtml(p.profiles ? p.profiles.username : '未知')}</span><span class="status-tag ${p.status}">${p.status}</span></div>
                    <div class="content">${escapeHtml(p.content)}</div>
                    <div class="meta">
                        ${p.status !== 'approved' ? `<button class="btn-sm" style="border-color:#2e9e3f; color:#2e9e3f; background: transparent; border: 1px solid;" onclick="reviewPost(${p.id}, 'approved')">设为公开</button>` : ''}
                        ${p.status !== 'banned' ? `<button class="btn-sm" style="border-color:#d92b2b; color:#d92b2b; background: transparent; border: 1px solid;" onclick="reviewPost(${p.id}, 'banned')">封禁</button>` : ''}
                    </div>
                `;
                allContainer.appendChild(div);
            });
        } else {
            allContainer.innerHTML = '<div style="color:#9ca3af; padding:10px;">暂无文章</div>';
        }
    }
 
    async function reviewPost(postId, newStatus) {
        if(!isAdminUI || !isAdminRole) return showToast('权限不足');
        const { error } = await sb.from('posts').update({ status: newStatus }).eq('id', postId);
        if(error) return showToast('操作失败：' + error.message, '#d92b2b');
        showToast(`文章状态已变更为: ${newStatus}`);
        loadAdminPostLists();
    }
 
    // ============================
    // 9. 个人中心 & 用户主页
    // ============================
    async function loadProfileData() {
        if(!currentUser) return navigate('auth');
        const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
        if(data) {
            document.getElementById('profileUsername').value = data.username || '';
            document.getElementById('profileAge').value = data.age || '';
            document.getElementById('profileBio').value = data.bio || '';
        }
    }
 
    async function updateProfile(btn) {
        const username = document.getElementById('profileUsername').value.trim();
        const age = document.getElementById('profileAge').value || null;
        const bio = document.getElementById('profileBio').value.trim();
        await withLoading(btn, async () => {
            const { error } = await sb.from('profiles').update({ username, age, bio }).eq('id', currentUser.id);
            if(error) { showToast('保存失败：' + error.message, '#d92b2b'); return; }
            showToast('个人资料修改成功！');
        });
    }
 
    async function loadMyPosts() {
        const { data } = await sb.from('posts').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
        const container = document.getElementById('myPostsList');
        container.innerHTML = '<h4 style="margin:20px 0 12px; font-size:16px;">我发布过的文章</h4>';
        if(data && data.length > 0) {
            data.forEach(p => {
                container.innerHTML += `<div style="padding: 12px; border-bottom:1px solid #e5e7eb;">${escapeHtml(p.content)} <span style="color:#9ca3af; font-size:12px;">(${p.status})</span></div>`;
            });
        } else {
            container.innerHTML += '<div style="color:#9ca3af; padding:10px;">暂无发表记录</div>';
        }
    }
 
    async function loadMyCollections() {
        const { data, error } = await sb.from('collections').select('*, posts(content)').eq('user_id', currentUser.id).order('created_at', { ascending: false });
        const container = document.getElementById('myPostsList');
        container.innerHTML = '<h4 style="margin:20px 0 12px; font-size:16px;">我的收藏</h4>';
        if(error) { container.innerHTML += '<div style="color:#9ca3af; padding:10px;">加载失败</div>'; return; }
        if(data && data.length > 0) {
            data.forEach(c => {
                container.innerHTML += `<div style="padding: 12px; border-bottom:1px solid #e5e7eb;">${escapeHtml(c.posts ? c.posts.content : '(原文章已删除)')}</div>`;
            });
        } else {
            container.innerHTML += '<div style="color:#9ca3af; padding:10px;">暂未收藏任何文章</div>';
        }
    }
 
    async function goToUserProfile(targetUserId) {
        navigate('user');
        document.getElementById('userInfoArea').innerHTML = '<div style="color:#9ca3af;">加载中...</div>';
        document.getElementById('userPostList').innerHTML = '';
 
        const { data: userInfo } = await sb.from('profiles').select('*').eq('id', targetUserId).single();
        if(userInfo) {
            document.getElementById('userInfoArea').innerHTML = `
                <h3 style="margin-bottom:12px;">${escapeHtml(userInfo.username || '未命名同志')} 的个人主页</h3>
                <div style="background:#f9fafb; padding:20px; border-radius:16px; border:1px solid #e5e7eb; margin:16px 0;">
                    <p style="margin:6px 0;">📅 年龄: ${userInfo.age || '未填写'}</p>
                    <p style="margin:6px 0;">📝 简介: ${escapeHtml(userInfo.bio) || '这位同志很低调'}</p>
                </div>
            `;
        } else {
            document.getElementById('userInfoArea').innerHTML = '<div style="color:#9ca3af;">用户不存在</div>';
            return;
        }
 
        const { data: userPosts } = await sb.from('posts').select('*').eq('user_id', targetUserId).eq('status', 'approved').order('created_at', { ascending: false });
        if(userPosts && userPosts.length > 0) {
            let html = '<h4 style="margin-bottom:16px;">他的文章</h4>';
            userPosts.forEach(p => {
                html += `<div class="post-card"><div class="content">${escapeHtml(p.content)}</div><div class="meta" style="justify-content: flex-start;">${new Date(p.created_at).toLocaleString()}</div></div>`;
            });
            document.getElementById('userPostList').innerHTML = html;
        } else {
            document.getElementById('userPostList').innerHTML = '<div style="color:#9ca3af;">该用户暂无公开文章</div>';
        }
    }
 
    // ============================
    // 10. 暴露给内联 onclick 使用的函数
    // ============================
    window.navigate = navigate;
    window.switchAuthTab = switchAuthTab;
    window.handleAuth = handleAuth;
    window.handleLogout = handleLogout;
    window.submitPost = submitPost;
    window.submitComment = submitComment;
    window.toggleCollect = toggleCollect;
    window.submitYouthLetter = submitYouthLetter;
    window.verifyAdmin = verifyAdmin;
    window.publishNotification = publishNotification;
    window.removeNotice = removeNotice;
    window.reviewPost = reviewPost;
    window.updateProfile = updateProfile;
    window.loadMyPosts = loadMyPosts;
    window.loadMyCollections = loadMyCollections;
    window.goToUserProfile = goToUserProfile;
    window.loadPosts = loadPosts;
 
    function init() {
        document.getElementById('logoutBtn').classList.add('hidden');
 
        const searchInput = document.getElementById('searchInput');
        if(searchInput && !searchInput.dataset.bound) {
            searchInput.dataset.bound = '1';
            searchInput.addEventListener('keydown', (e) => {
                if(e.key === 'Enter') {
                    navigate('home');
                    loadPosts(e.target.value.trim());
                }
            });
        }
 
        getCurrentUser().then(async (user) => {
            if(user) {
                currentUser = user;
                isAdminRole = await checkIsAdminRole(user.id);
                updateNavForUser(true);
            }
            navigate('home');
        });
    }
 
    if(document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
</body>
</html>
